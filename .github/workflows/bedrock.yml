name: name: Bedrock Server

on: workflow_dispatch

jobs:
  server:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y wget unzip

      - name: Download PocketMine
        run: |
          wget https://get.pmmp.io -O install.sh
          chmod +x install.sh
          ./install.sh

      - name: Start Server
        run: |
          cd PocketMine-MP
          ./start.sh
